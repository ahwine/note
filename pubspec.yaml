name: notes_app
description: "Aplikasi catatan pribadi"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Rich Text Editor
  flutter_quill: ^11.5.0

  # Image
  image_picker: ^1.1.2
  http: ^1.2.2

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Biometric
  local_auth: ^2.3.0

  # Audio / Voice Note
  record: ^6.2.0
  audioplayers: ^6.6.0

  # Export
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  docs_gee: ^1.3.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true